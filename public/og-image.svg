<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="120" r="180" fill="white" fill-opacity="0.08"/>
  <circle cx="1050" cy="500" r="220" fill="white" fill-opacity="0.08"/>
  <text x="100" y="280" font-family="Inter, sans-serif" font-size="80" font-weight="800" fill="white">Notazo</text>
  <text x="100" y="360" font-family="Inter, sans-serif" font-size="44" font-weight="700" fill="white">Calcula tus notas,</text>
  <text x="100" y="420" font-family="Inter, sans-serif" font-size="44" font-weight="700" fill="white">proyecta tu futuro.</text>
  <text x="100" y="500" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.85">Calculadora de notas, examen final</text>
  <text x="100" y="535" font-family="Inter, sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.85">y eximición. 100% gratis.</text>
  <g transform="translate(820,200)">
    <rect width="280" height="220" rx="20" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
    <text x="140" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#6b7280">Tu promedio</text>
    <text x="140" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="80" font-weight="800" fill="#2563eb">5.8</text>
    <text x="140" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#6b7280">Escala 1.0 – 7.0</text>
  </g>
